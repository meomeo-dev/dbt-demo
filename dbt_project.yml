name: 'dbt_demo'
version: '1.0.0'
config-version: 2
profile: 'my_local_dwh'

model-paths: ["models"]
seed-paths:  ["seeds"]
test-paths:  ["tests"]
analysis-paths: ["analyses"]
macro-paths:  ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_demo:
    # Trino MySQL connector 不支持 CREATE VIEW，staging 层统一用 table 物化
    staging:
      +materialized: table
    marts:
      +materialized: table
