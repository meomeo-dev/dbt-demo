version: 2

sources:
  - name: raw
    description: "Seeds 数据，由 dbt seed 载入 MySQL analytics schema"
    database: mysql      # Trino catalog 名
    schema: analytics    # MySQL database 名
    tables:
      - name: raw_customers
        description: "原始客户数据"
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: name
            tests:
              - not_null
          - name: email
            tests:
              - unique
              - not_null

      - name: raw_orders
        description: "原始订单数据"
        columns:
          - name: id
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: status
            tests:
              - accepted_values:
                  values: ['completed', 'shipped', 'returned', 'pending']
