version: 2

# ─────────────────────────────────────────────────────────────────────────────
# marts 层模型的文档与测试
#   对齐教学:docs/dbt-数仓教学/07-步骤5-marts业务聚合层.md、08-步骤6-测试与数据质量.md
# ─────────────────────────────────────────────────────────────────────────────
models:
  - name: dim_customers
    description: "客户维度表:每个客户一行,含累计订单指标"
    columns:
      - name: customer_id
        description: "客户主键"
        tests: [unique, not_null]
      - name: lifetime_orders
        description: "累计订单数(无单客户为 0)"
        tests: [not_null]

  - name: dim_products
    description: "产品维度表:每个 SKU 一行,含售价/成本/毛利"
    columns:
      - name: product_sku
        description: "产品主键"
        tests: [unique, not_null]

  - name: dim_stores
    description: "门店维度表"
    columns:
      - name: store_id
        description: "门店主键"
        tests: [unique, not_null]

  - name: fct_orders
    description: "订单事实表:每笔订单一行(粒度=订单)"
    columns:
      - name: order_id
        description: "订单主键"
        tests: [unique, not_null]
      - name: customer_id
        description: "客户外键 → dim_customers"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: store_id
        description: "门店外键 → dim_stores"
        tests:
          - relationships:
              to: ref('dim_stores')
              field: store_id

  - name: fct_order_items
    description: "订单行事实表:每个下单商品一行(最细粒度)"
    columns:
      - name: order_item_id
        description: "订单行主键"
        tests: [unique, not_null]
      - name: order_id
        description: "订单外键 → fct_orders"
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_id
      - name: product_sku
        description: "产品外键 → dim_products"
        tests:
          - relationships:
              to: ref('dim_products')
              field: product_sku
