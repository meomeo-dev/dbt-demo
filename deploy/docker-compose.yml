services:
  mysql:
    image: mysql:9.7
    container_name: dbt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: analytics
      MYSQL_USER: dbt
      MYSQL_PASSWORD: dbt_pw
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # 容器首次初始化时执行:创建 sqltools 只读账户(见 mysql-init/)
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-udbt", "-pdbt_pw"]
      interval: 10s
      timeout: 5s
      retries: 5

  trino:
    build:
      context: .
      dockerfile: Dockerfile.trino
    image: dbt-trino-local:482
    container_name: dbt-trino
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
